services:
  sandbox:
    build: .
    container_name: gemini
    stdin_open: true
    tty: true
    init: true
    network_mode: "host"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - GEMINI_SANDBOX=docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:/app
      - ~/.gemini:/root/.gemini:rw
    user: "root"
